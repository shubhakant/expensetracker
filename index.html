<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Daily Expense Tracker</h1>
            <div class="total-display">
                <span>Total Spent:</span>
                <span id="total-amount">₹0.00</span>
            </div>
        </header>

        <section class="add-expense">
            <h2>Add New Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="expense-name">Description</label>
                    <input type="text" id="expense-name" placeholder="What did you buy?" required>
                </div>
                <div class="form-group">
                    <label for="expense-amount">Amount (₹)</label>
                    <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="expense-date">Date</label>
                    <input type="date" id="expense-date" required>
                </div>
                <div class="form-group">
                    <label for="expense-category">Category</label>
                    <select id="expense-category" required>
                        <option value="" disabled selected>Select Category</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-add">Add Expense</button>
            </form>
        </section>

        <section class="expense-list">
            <h2>Recent Expenses</h2>
            <ul id="expense-list-items">
                <!-- Expense items will be added here dynamically -->
                <li class="empty-state">No expenses added yet.</li>
            </ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
